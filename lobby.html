<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby QuITS</title>
    <link rel="icon" type="image/png" href="Logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <div class="back-header">
        <button class="btn-back" onclick="handleGoBack()">← Keluar</button>
    </div>

    <h2 id="lobby-role">Lobby</h2>

    <h1 id="lobby-pin"
        style="
        font-size:48px;
        letter-spacing:4px;
        color:var(--accent);">
        000000
    </h1>
    <p id="lobby-status">Menunggu peserta...</p>
    <p id="participant-count">0 / 10 peserta</p>
    <hr>

    <h3>Peserta</h3>
    <ul
        id="player-container"
        class="player-list">
    </ul>

    <div id="host-panel"
         style="display:none;">

        <h3 style="margin-top: 20px; margin-bottom: 15px;">⚙️ Pengaturan Kuis</h3>
        
        <div style="background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
            <div class="form-group">
                <label for="num-questions">Jumlah Soal</label>
                <input type="number" id="num-questions" min="1" max="50" value="5" placeholder="Berapa soal?">
            </div>

            <div class="form-group">
                <label for="timer-seconds">Timer per Soal (detik)</label>
                <input type="number" id="timer-seconds" min="5" max="120" value="30" placeholder="Berapa detik?">
            </div>

            <div style="background: white; padding: 10px; border-radius: 8px; border-left: 3px solid var(--accent); margin-top: 10px;">
                <p style="margin: 0; font-size: 12px; color: #7f8c8d;">
                    <strong>📊 Max Points:</strong> <span id="max-points-display">3 × 30</span> per soal
                </p>
                <p style="margin: 5px 0 0 0; font-size: 11px; color: #7f8c8d;">
                    (Jawab dalam 3 detik = full points, setelah itu -1 per detik)
                </p>
            </div>
        </div>

        <button
            class="btn btn-primary"
            onclick="handleStartQuiz()">

            Mulai Kuis 🚀

        </button>

    </div>

    <div id="participant-panel"
         style="display:none;">
        <p>Menunggu host memulai kuis...</p>
    </div>
</div>

<script src="app.js"></script>

<script>
initLobbyPage();
</script>

</body>
</html>
