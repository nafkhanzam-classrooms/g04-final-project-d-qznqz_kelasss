<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby QuITS</title>
    <link rel="icon" type="image/png" href="Logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <div class="back-header">
        <button class="btn-back" onclick="handleGoBack()">← Keluar</button>
    </div>

    <h2 id="lobby-role">Lobby</h2>

    <h1 id="lobby-pin"
        style="
        font-size:48px;
        letter-spacing:4px;
        color:var(--accent);">
        000000
    </h1>
    <p id="lobby-status">Menunggu peserta...</p>
    <p id="participant-count">0 / 10 peserta</p>
    <hr>

    <h3>Peserta</h3>
    <ul
        id="player-container"
        class="player-list">
    </ul>

    <div id="host-panel"
         style="display:none;">

        <button
            class="btn btn-primary"
            onclick="handleStartQuiz()">

            Mulai Kuis 🚀

        </button>

    </div>

    <div id="participant-panel"
         style="display:none;">
        <p>Menunggu host memulai kuis...</p>
    </div>
</div>

<script src="app.js"></script>

<script>
initLobbyPage();
</script>

</body>
</html>
