<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard QuITS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>🏆 Leaderboard Akhir</h1>
    <p>Kuis telah selesai.</p>

    <img
        id="leaderboard-meme"
        src="assets/leaderboard.jpg"
        alt="leaderboard meme"
        style="max-width:350px; margin-bottom:20px; border-radius:12px;">

    <div id="score-container"
        style="background:#fff3cd; padding:20px; border-radius:12px; margin-bottom:20px;">
        <h3>Skor Anda</h3>
        <h1 id="final-score-display">0</h1>
    </div>

    <h3>Peringkat Akhir</h3>

    <ul id="leaderboard-list" class="player-list"></ul>

    <button class="btn btn-primary" onclick="clearAndGoHome()">
        Kembali ke Beranda
    </button>
</div>

<script src="app.js"></script>
<script>
    // Pastikan fungsi dipanggil saat halaman dimuat
    document.addEventListener('DOMContentLoaded', initLeaderboardPage);
</script>
</body>
</html>
