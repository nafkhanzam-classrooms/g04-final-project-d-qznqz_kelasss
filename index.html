<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kelas Interaktif - Masuk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>Sistem Kelas Interaktif</h1>
        <p>Silakan buat kelas baru atau gabung ke kelas yang ada.</p>
        
        <div class="form-group">
            <label for="input-pin">PIN Kelas</label>
            <input type="text" id="input-pin" placeholder="Contoh: 123456">
        </div>
        <div class="form-group">
            <label for="input-name">Nama Peserta</label>
            <input type="text" id="input-name" placeholder="Masukkan nama Anda">
        </div>
        <button class="btn btn-primary" onclick="handleJoinClass()">Gabung Kelas 🙋‍♂️</button>
        
        <div class="divider"><span>ATAU</span></div>
        
        <button class="btn btn-accent" onclick="handleCreateClass()">Buat Kelas Baru (Host) 🧑‍🏫</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
