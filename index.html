<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuITS - Masuk</title>
    <link rel="icon" type="image/png" href="Logo">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>😂QuITS</h1>
    <p>Silakan buat kelas baru atau gabung ke kelas yang ada</p>

    <div class="form-group">
        <label for="input-pin">PIN Kelas</label>
        <input type="text" id="input-pin" maxlength="6" placeholder="Contoh: 123456">
    </div>
    <div class="form-group">
        <label for="input-name">Nama</label>
        <input type="text" id="input-name" maxlength="30" placeholder="Masukkan nama Anda">
    </div>

    <button class="btn btn-primary" onclick="handleJoinClass()">Gabung Kelas 🙋</button>

    <div class="divider"><span>ATAU</span></div>

    <button id="create-room-btn" class="btn btn-accent" onclick="handleCreateClass()">Buat Kelas Baru (Host) 👨‍🏫</button>

    <div id="connection-status" style="margin-top:15px;"></div>
</div>

<script src="app.js"></script>

</body>
</html>
