<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesi Kuis Berjalan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card" style="max-width: 700px;">
        <div class="back-header">
            <button class="btn-back" onclick="handleGoBack()">← Keluar Sesi</button>
        </div>

        <h2 id="quiz-title">Pertanyaan Kuis</h2>
        <hr style="margin: 15px 0; border: 0; height: 1px; background: #cbd5e1;">
        
        <h1 id="question-text" style="font-size: 24px; margin: 20px 0;">Menunggu Pertanyaan...</h1>

        <div id="participant-quiz-space" style="display: none;">
            <p>Pilih jawaban yang paling tepat di bawah ini:</p>
            <div class="quiz-grid">
                <button class="btn-quiz q-red" onclick="handleAnswer('A')">▲ A</button>
                <button class="btn-quiz q-blue" onclick="handleAnswer('B')">✖ B</button>
                <button class="btn-quiz q-yellow" onclick="handleAnswer('C')">● C</button>
                <button class="btn-quiz q-green" onclick="handleAnswer('D')">■ D</button>
            </div>
        </div>

        <div id="host-quiz-space" style="display: none; margin-top: 30px;">
            <p style="margin-bottom: 10px;">Kontrol Sesi:</p>
            <button class="btn btn-accent" onclick="handleNextQuestion()">Pertanyaan Berikutnya ⏭️</button>
            <button class="btn btn-danger" onclick="handleEndQuiz()">Akhiri Sesi Kuis 🛑</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        initQuizPage();
    </script>
</body>
</html>
